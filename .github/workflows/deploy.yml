name: ci-cd

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions: 
  contents: read
  packages: write

jobs:
  test-build-push: 
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: 'backend/package-lock.json'

      - name: Run tests
        working-directory: ./backend
        run: npm ci && npm test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/azzazeru/azza-links/backend
          tags: |
            type=raw, value=latest 
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with: 
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-vm:
    runs-on: ubuntu-latest
    needs: test-build-push
    environment: azza-links-env

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY}}
          source: ./backend/docker-compose.yml
          target: /opt/azza-links/

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY}}
          script: |
            set -eu pipefail
            sudo mkdir -p /opt/azza-links
            sudo chown $USER:$USER /opt/azza-links
            cd /opt/azza-links

            cat <<'EOF' | sed 's/^[[:space:]]*//' > .env
              DATABASE_URL=${{ secrets.DATABASE_URL }}
              PORT=${{ vars.PORT }}
              NODE_ENV=${{ vars.NODE_ENV }}
              FRONTEND_URL=${{ vars.FRONTEND_URL }}
            EOF

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose pull
            docker compose up -d

            docker image prune -f

            sleep 5
            curl -f http://localhost:3000/ || exit 1
            echo "Deployment successful!"
